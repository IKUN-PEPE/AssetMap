services:
  postgres:
    image: postgres:16
    container_name: assetmap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: assetmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - assetmap-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assetmap"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  assetmap-postgres-data:
